<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Excel Parser – Human Correction & Schema Matching</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 2rem; }
        .card { margin-top: 2rem; }
        .sheet-card { margin-bottom: 1rem; border-left: 4px solid #0d6efd; }
        pre { background: #f4f4f4; padding: 0.5rem; border-radius: 0.25rem; overflow-x: auto; }
        .decision-badge { font-size: 0.8rem; }
        .header-preview { font-family: monospace; background: #e9ecef; padding: 0.5rem; border-radius: 0.25rem; margin-top: 0.5rem; }
        .skip-checkbox { margin-right: 1rem; }
        .alert-success { margin-top: 1rem; }
        .similarity-table { font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">🤖 AI Excel Parser – Human Correction & Schema Matching</h4>
                </div>
                <div class="card-body">
                    <form id="uploadForm" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="fileInput" class="form-label">Choose Excel file (.xlsx, .xls, .xlsm)</label>
                            <input class="form-control" type="file" id="fileInput" name="file" accept=".xlsx,.xls,.xlsm" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Upload & Analyze</button>
                        <button type="button" id="resetBtn" class="btn btn-secondary">🔄 New File</button>
                        <div id="loading" class="mt-3 text-primary d-none">🤔 AI is analyzing headers... ⏳</div>
                    </form>

                    <div id="correctionArea" class="mt-4" style="display: none;">
                        <h5>📝 Review and correct AI decisions</h5>
                        <div id="sheetsContainer"></div>
                        <button id="submitCorrectionsBtn" class="btn btn-success mt-3">✅ Apply Corrections & Check Similarity</button>
                    </div>

                    <div id="similarityArea" class="mt-4" style="display: none;">
                        <h5>📊 Schema Similarity Report</h5>
                        <div id="similarityContent"></div>
                        <button id="loadDataBtn" class="btn btn-primary mt-3" style="display: none;">📥 Load Data into Target Tables</button>
                        <div id="loadResult" class="alert alert-info mt-3" style="display: none;"></div>
                    </div>

                    <div id="errorArea" class="mt-4 text-danger" style="display: none;">
                        <strong>Error:</strong> <span id="errorMessage"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentFileHash = null;
    let currentSheets = [];
    let currentSimilarityReport = null;

    const form = document.getElementById('uploadForm');
    const fileInput = document.getElementById('fileInput');
    const loadingDiv = document.getElementById('loading');
    const correctionArea = document.getElementById('correctionArea');
    const sheetsContainer = document.getElementById('sheetsContainer');
    const similarityArea = document.getElementById('similarityArea');
    const similarityContent = document.getElementById('similarityContent');
    const loadDataBtn = document.getElementById('loadDataBtn');
    const loadResult = document.getElementById('loadResult');
    const errorArea = document.getElementById('errorArea');
    const errorMessage = document.getElementById('errorMessage');
    const submitBtn = document.getElementById('submitCorrectionsBtn');
    const resetBtn = document.getElementById('resetBtn');

    // Reset UI but keep the selected file (used before upload)
    function resetUI() {
        correctionArea.style.display = 'none';
        similarityArea.style.display = 'none';
        errorArea.style.display = 'none';
        loadResult.style.display = 'none';
        loadDataBtn.style.display = 'none';
        sheetsContainer.innerHTML = '';
        errorMessage.textContent = '';
        currentFileHash = null;
        currentSheets = [];
        currentSimilarityReport = null;
        loadDataBtn.disabled = false;
        loadDataBtn.innerText = '📥 Load Data into Target Tables';
    }

    // Full reset including file input (used by New File button)
    function fullReset() {
        resetUI();
        fileInput.value = '';
    }

    resetBtn.addEventListener('click', fullReset);

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const file = fileInput.files[0];
        if (!file) {
            errorMessage.textContent = 'Please select a file';
            errorArea.style.display = 'block';
            return;
        }

        // Reset UI before new upload (but keep the file)
        resetUI();

        const formData = new FormData();
        formData.append('file', file);

        loadingDiv.classList.remove('d-none');

        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Unknown error');

            currentFileHash = data.file_hash;
            currentSheets = data.sheets;
            renderCorrectionUI(data.sheets);
            correctionArea.style.display = 'block';
        } catch (err) {
            errorMessage.textContent = err.message;
            errorArea.style.display = 'block';
        } finally {
            loadingDiv.classList.add('d-none');
        }
    });

    async function updateHeaderPreview(sheetName, option, previewDivId) {
        try {
            const response = await fetch('/preview_headers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    file_hash: currentFileHash,
                    sheet_name: sheetName,
                    option: option
                })
            });
            const data = await response.json();
            if (response.ok && data.headers) {
                const previewDiv = document.getElementById(previewDivId);
                previewDiv.innerHTML = '<strong>Preview headers:</strong><br>' +
                    data.headers.map(h => `&nbsp;&nbsp;• ${h}`).join('<br>');
            }
        } catch (err) {
            console.error("Preview error:", err);
        }
    }

    function renderCorrectionUI(sheets) {
        sheetsContainer.innerHTML = '';
        for (let sheet of sheets) {
            if (sheet.skipped) continue;
            const ai = sheet.ai_decision;
            const currentStartRow = ai.header_start_row;
            const currentRows = ai.header_rows_count;

            let selectedOption = "";
            if (currentStartRow === 0 && currentRows === 1) selectedOption = "1";
            else if (currentStartRow === 1 && currentRows === 1) selectedOption = "2";
            else if (currentStartRow === 0 && currentRows === 2) selectedOption = "12";
            else selectedOption = "1";

            const previewId = `preview-${sheet.sheet_name.replace(/\s/g, '_')}`;

            const card = document.createElement('div');
            card.className = 'card sheet-card p-3';
            card.innerHTML = `
                <h6>📄 Sheet: <strong>${escapeHtml(sheet.sheet_name)}</strong></h6>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-check">
                            <input class="form-check-input skip-checkbox" type="checkbox" data-sheet="${sheet.sheet_name}" id="skip-${sheet.sheet_name.replace(/\s/g, '_')}">
                            <label class="form-check-label" for="skip-${sheet.sheet_name.replace(/\s/g, '_')}">
                                Skip this sheet (do not store data)
                            </label>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Header selection:</label>
                        <select class="form-select header-select" data-sheet="${sheet.sheet_name}" data-preview="${previewId}" id="select-${sheet.sheet_name.replace(/\s/g, '_')}">
                            <option value="1" ${selectedOption === "1" ? "selected" : ""}>First row only (header_start_row=0, rows=1)</option>
                            <option value="2" ${selectedOption === "2" ? "selected" : ""}>Second row only (skip first row, rows=1)</option>
                            <option value="12" ${selectedOption === "12" ? "selected" : ""}>First and second row concatenated (multi‑level)</option>
                        </select>
                    </div>
                </div>
                <div class="mt-2">
                    <div id="${previewId}" class="header-preview">
                        <em>Loading preview...</em>
                    </div>
                </div>
                <div class="mt-2">
                    <small>Data preview (first 3 rows):</small>
                    <pre class="small">${escapeHtml(JSON.stringify(sheet.first_data_rows_preview || [], null, 2))}</pre>
                </div>
            `;
            sheetsContainer.appendChild(card);

            updateHeaderPreview(sheet.sheet_name, selectedOption, previewId);

            const skipCheckbox = card.querySelector('.skip-checkbox');
            const headerSelect = card.querySelector('.header-select');
            skipCheckbox.addEventListener('change', (e) => {
                headerSelect.disabled = e.target.checked;
            });
        }

        document.querySelectorAll('.header-select').forEach(select => {
            select.addEventListener('change', (e) => {
                const sheetName = select.getAttribute('data-sheet');
                const previewId = select.getAttribute('data-preview');
                const option = select.value;
                updateHeaderPreview(sheetName, option, previewId);
            });
        });
    }

    submitBtn.addEventListener('click', async () => {
        const corrections = [];
        for (let sheet of currentSheets) {
            if (sheet.skipped) continue;
            const select = document.getElementById(`select-${sheet.sheet_name.replace(/\s/g, '_')}`);
            const skipCheckbox = document.getElementById(`skip-${sheet.sheet_name.replace(/\s/g, '_')}`);
            const skipped = skipCheckbox ? skipCheckbox.checked : false;
            let start_row = 0, rows = 1;
            if (!skipped && select) {
                const value = select.value;
                if (value === "1") { start_row = 0; rows = 1; }
                else if (value === "2") { start_row = 1; rows = 1; }
                else if (value === "12") { start_row = 0; rows = 2; }
            }
            corrections.push({
                sheet_name: sheet.sheet_name,
                skipped: skipped,
                header_start_row: start_row,
                header_rows_count: rows
            });
        }

        loadingDiv.classList.remove('d-none');
        try {
            const response = await fetch('/apply_corrections', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    file_hash: currentFileHash,
                    corrections: corrections
                })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error);

            const matchResponse = await fetch('/match_schema', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const report = await matchResponse.json();
            if (!matchResponse.ok) throw new Error(report.error);

            correctionArea.style.display = 'none';
            similarityContent.innerHTML = renderSimilarityReport(report);
            similarityArea.style.display = 'block';
            loadDataBtn.style.display = 'inline-block';
            loadResult.style.display = 'none';

            currentSimilarityReport = report;
        } catch (err) {
            errorMessage.textContent = err.message;
            errorArea.style.display = 'block';
        } finally {
            loadingDiv.classList.add('d-none');
        }
    });

    function renderSimilarityReport(report) {
        let html = `<p><strong>Overall similarity score:</strong> ${report.similarity_score}%</p>`;
        html += `<table class="table table-sm table-bordered similarity-table">
                    <thead>
                        <tr><th>Excel Sheet</th><th>Target Table</th><th>Similarity</th><th>Explanation</th>
                        </tr>
                    </thead>
                    <tbody>`;
        for (let sugg of report.mapping_suggestions) {
            html += `<tr>
                        <td>${escapeHtml(sugg.excel_sheet)}</td>
                        <td>${escapeHtml(sugg.target_table || '—')}</td>
                        <td>${escapeHtml(sugg.similarity)}</td>
                        <td>${escapeHtml(sugg.explanation)}</td>
                     </tr>`;
        }
        html += `</tbody></table>`;
        if (report.unmatched_excel_sheets && report.unmatched_excel_sheets.length) {
            html += `<div class="alert alert-warning">⚠️ Unmatched Excel sheets: ${report.unmatched_excel_sheets.join(', ')}</div>`;
        }
        if (report.unmatched_target_tables && report.unmatched_target_tables.length) {
            html += `<div class="alert alert-info">ℹ️ Unmatched target tables: ${report.unmatched_target_tables.join(', ')}</div>`;
        }
        html += `<pre class="small">${escapeHtml(JSON.stringify(report.recommendations, null, 2))}</pre>`;
        return html;
    }

    loadDataBtn.addEventListener('click', async () => {
        loadDataBtn.disabled = true;
        loadDataBtn.innerText = 'Loading...';
        loadResult.style.display = 'block';
        loadResult.innerHTML = '⏳ Loading data into target tables...';
        loadResult.className = 'alert alert-info';

        try {
            const response = await fetch('/finalize_and_load', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    file_hash: currentFileHash,
                    similarity_report: currentSimilarityReport
                })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error);

            loadResult.className = 'alert alert-success';
            loadResult.innerHTML = `✅ Data loaded successfully!<br>
                                    Inserted counts: ${JSON.stringify(data.inserted_counts)}<br>
                                    Similarity score: ${data.similarity_score}%`;
            loadDataBtn.style.display = 'none';
        } catch (err) {
            loadResult.className = 'alert alert-danger';
            loadResult.innerHTML = `❌ Error: ${err.message}`;
            loadDataBtn.disabled = false;
            loadDataBtn.innerText = '📥 Load Data into Target Tables';
        }
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
