[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Command line options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov-fail-under=0

# Markers (custom markers can be added here)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests (requires external services)

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:.*pandas.*:
